title: SZZ materiály
description: Digitální rozcestník studijních materiálů pro státní závěrečné zkoušky.
remote_theme: pages-themes/cayman@v0.2.0
repository: ondrejsvorc/SZZ
show_downloads: true

url: "https://szz.ondrejsvorc.cz"

defaults:
  - scope:
      path: ""
    values:
      layout: default

exclude:
  - .git
  - .cursor
  - vendor
  - pipeline.yml
  - generate_index.py
  - README.md
  - Gemfile
  - Gemfile.lock